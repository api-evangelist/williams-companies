aid: williams-companies
name: Williams Companies
description: >-
  The Williams Companies is an American Fortune 500 energy company focused on natural
  gas infrastructure, processing, and transportation. Williams owns and operates
  midstream energy assets including the Transco pipeline (the largest natural gas
  pipeline in the United States), gathering and processing systems, and storage
  facilities. Williams serves natural gas producers, local distribution companies,
  and large-volume end users. The company provides customer portal access for
  operational data and FERC-regulated electronic bulletin boards for capacity
  transactions, but does not offer public developer REST APIs.
